preprocessing:
  base_config:
    - configs/base.yaml
  
  # Configurações de Dados e Aumentação (Padrão DiffSinger)
  raw_data_dir: []
  binary_data_dir: null
  binarization_args:
    num_workers: 8
    shuffle: true
  DataIndexPath: data
  valid_set_name: valid
  train_set_name: train
  

  volume_aug: true
  volume_aug_prob: 0.5
  mel_vmin: -6.0
  mel_vmax: 1.5
  
  # Configurações de Perda (Loss)
  lab_aux_melloss: 45.0
  lab_aux_stftloss: 2.5
  use_stftloss: true
  loss_fft_sizes: [2048, 2048, 4096, 1024, 512, 256, 128]
  loss_hop_sizes: [512, 240, 480, 100, 50, 25, 12]
  loss_win_lengths: [2048, 1200, 2400, 480, 240, 120, 60]

global constants:
  audio_sample_rate: 44100   # 44.1kHz (Padrão BigVGAN V2 & DiffSinger)
  audio_num_mel_bins: 128    # 128 bins (Padrão BigVGAN V2 & DiffSinger)
  hop_size: 512              # Hop de 512 (Produto de 8*4*2*2*2*2)
  fft_size: 2048             # FFT de 2048
  win_size: 2048             # Window de 2048
  
  fmin: 40
  fmax: 16000
  fmax_for_loss: null
  
  crop_mel_frames: 32        # Tamanho do crop durante o treino (Ajuste conforme VRAM)
  test_prefixes: []
  
  # Extração de Pitch (Usado se for recalcular ou para validação)
  pe: rmvpe
  pe_ckpt: pretrained/rmvpe/model.pt

neural networks:
  task_cls: training.nsf_bigvgan_v2_task.nsf_bigvgan_v2_task
  
  model_args:
    # --- BigVGAN V2 Generator Args ---
    resblock: "1"                      # AMPBlock1 (Padrão BigVGAN V2)
    upsample_rates: [8, 4, 2, 2, 2, 2] # Produto = 512 (Bate com hop_size)
    upsample_kernel_sizes: [16, 8, 4, 4, 4, 4]
    upsample_initial_channel: 1536     # Canal inicial massivo do BigVGAN V2
    resblock_kernel_sizes: [3, 7, 11]
    resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
    
    # Ativações Anti-Aliasing (A alma do BigVGAN)
    activation: "snakebeta"
    snake_logscale: true
    
    # Configurações de Saída
    use_tanh_at_final: false           # BigVGAN V2 usa clamp em vez de tanh
    use_bias_at_final: false
    
    # --- NSF (Neural Source Filter) Args ---
    # Injeção de F0 para precisão cirúrgica em SVS
    nsf_harmonic_num: 8
    nsf_sine_amp: 0.1
    nsf_noise_std: 0.003
    nsf_voiced_threshold: 0

    # --- Discriminator Args ---
    # MPD (Multi-Period Discriminator)
    discriminator_periods: [2, 3, 5, 7, 11] # Períodos padrão do BigVGAN V2
    
    # MRD (Multi-Resolution Discriminator) - Padrão DiffSinger
    mrd_fft_sizes: [1024, 2048, 512]
    mrd_hop_sizes: [120, 240, 50]
    mrd_win_lengths: [600, 1200, 240]

training:
  
  # Otimizador do Discriminador
  discriminate_optimizer_args:
    optimizer_cls: torch.optim.AdamW
    lr: 0.0002
    beta1: 0.8       # Beta1=0.8 é crucial para estabilidade em GANs de áudio
    beta2: 0.99
    weight_decay: 0

  # Otimizador do Gerador
  generater_optimizer_args:
    optimizer_cls: torch.optim.AdamW
    lr: 0.0002
    beta1: 0.8
    beta2: 0.99
    weight_decay: 0

  # Scheduler de Learning Rate
  lr_scheduler_args:
    scheduler_cls: lr_scheduler.scheduler.WarmupLR
    warmup_steps: 5000
    min_lr: 0.00001
    
  clip_grad_norm: null
  
  # Dataloader e Batch
  ds_workers: 4
  dataloader_prefetch_factor: 2
  batch_size: 8      
  
  # Logging e Salvamento
  num_valid_plots: 100
  log_interval: 100
  num_sanity_val_steps: 1
  val_check_interval: 5000
  num_ckpt_keep: 5
  max_updates: 1000000
  permanent_ckpt_start: 200000
  permanent_ckpt_interval: 40000

pytorch lightning:
  pl_trainer_accelerator: 'auto'
  pl_trainer_devices: 'auto'
  # Recomenda-se '32-true' para treino. Se tiver GPU com suporte a BF16 (RTX 30/40),
  # pode testar 'bf16', mas evite '16-mixed' no início.
  pl_trainer_precision: '32-true'
  
  pl_trainer_num_nodes: 1
  pl_trainer_strategy:
    name: auto
    process_group_backend: nccl
    find_unused_parameters: true
    nccl_p2p: true
    
  seed: 114514

finetune:
  finetune_enabled: false
  finetune_ckpt_path: null
  finetune_ignored_params: []
  finetune_strict_shapes: true
  freezing_enabled: false
  frozen_params: []
